*{margin:0;padding:0;box-sizing:border-box;}
:root{
--green:#1a6b3a;
--green-dark:#134f2b;
--green-light:#2d8a4e;
--gold:#c9a84c;
--gold-light:#e2c06a;
--gray-dark:#1e1e1e;
--gray:#4a4a4a;
--gray-light:#f5f5f5;
--white:#ffffff;
--shadow:0 4px 24px rgba(0,0,0,0.10);

}
html{scroll-behavior:smooth;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;color:var(--gray-dark);background:var(--white);line-height:1.7;font-size:16px;}
img{max-width:100%;height:auto;display:block;}
a{text-decoration:none;color:inherit;}

/* ===== HEADER ===== */
.site-header{background:var(--green-dark);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.site-header .logo{color:var(--white);font-size:14px;font-weight:700;letter-spacing:0.05em;}
.site-header .header-badge{background:var(--gold);color:var(--gray-dark);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.05em;}

.hero-img-placeholder{text-align:center;}

.hero-badge-item .b-icon{font-size:16px;}
.cta-btn{display:inline-block;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 100%);color:var(--gray-dark);font-size:18px;font-weight:900;padding:18px 40px;border-radius:50px;letter-spacing:0.05em;box-shadow:0 6px 20px rgba(201,168,76,0.45);transition:transform 0.2s,box-shadow 0.2s;border:none;cursor:pointer;text-align:center;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,168,76,0.55);}
.cta-btn small{display:block;font-size:12px;font-weight:500;margin-top:4px;opacity:0.8;}
.hero-price-box{margin-top:20px;}
.hero-price{font-size:clamp(28px,7vw,44px);font-weight:900;color:var(--gold-light);letter-spacing:-0.01em;}
.hero-price span{font-size:16px;font-weight:500;opacity:0.85;}
.hero-price-note{font-size:12px;opacity:0.7;margin-top:4px;}

/* ===== SECTION COMMON ===== */
.section{padding:60px 20px;}
.section-inner{max-width:720px;margin:0 auto;}
.section-label{display:inline-block;color:var(--green);font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;border-left:3px solid var(--green);padding-left:10px;}
.section-title{font-size:clamp(20px,5vw,30px);font-weight:900;line-height:1.35;margin-bottom:12px;color:var(--gray-dark);}
.section-title span{color:var(--green);}
.section-lead{font-size:15px;color:var(--gray);line-height:1.8;}

/* ===== PROBLEM ===== */
.problem{background:var(--gray-light);}
.problem-list{margin-top:28px;display:flex;flex-direction:column;gap:12px;}

.problem-item .p-icon{font-size:26px;flex-shrink:0;}
.problem-item p{font-size:15px;color:var(--gray);font-weight:500;}

/* ===== FEATURES ===== */
.features{background:var(--white);}
.features-grid{margin-top:36px;display:grid;grid-template-columns:1fr;gap:20px;}
.feature-card{border:2px solid #e8f0eb;border-radius:14px;padding:28px 24px;position:relative;overflow:hidden;transition:box-shadow 0.2s,border-color 0.2s;}

.feature-card:hover{box-shadow:var(--shadow);border-color:var(--green-light);}
.feature-num{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase;}
.feature-icon{font-size:44px;margin-bottom:12px;}
.feature-title{font-size:18px;font-weight:800;color:var(--gray-dark);margin-bottom:10px;line-height:1.3;}
.feature-desc{font-size:14px;color:var(--gray);line-height:1.8;}
.feature-tag{display:inline-block;background:var(--green);color:var(--white);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:12px;letter-spacing:0.05em;}

/* ===== TARGET ===== */
.target{background:linear-gradient(135deg,#f0f7f3 0%,#e8f5ee 100%);border-top:3px solid var(--green);border-bottom:3px solid var(--green);}

.target-item .t-check{width:28px;height:28px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.target-item .t-check::after{content:'✓';color:var(--white);font-size:14px;font-weight:700;}
.target-item-text strong{display:block;font-size:15px;font-weight:700;color:var(--gray-dark);margin-bottom:3px;}
.target-item-text p{font-size:13px;color:var(--gray);}
.target-cta{margin-top:36px;text-align:center;}

/* ===== REVIEWS ===== */
.reviews{background:var(--white);}
.reviews-grid{margin-top:32px;display:flex;flex-direction:column;gap:20px;}
.review-card{background:var(--gray-light);border-radius:14px;padding:24px 22px;position:relative;}

.review-text{font-size:14px;color:var(--gray-dark);line-height:1.8;margin-bottom:14px;}
.review-text::before{content:'"';font-size:28px;color:var(--green);font-weight:900;line-height:0;vertical-align:-12px;margin-right:4px;}
.review-text::after{content:'"';font-size:28px;color:var(--green);font-weight:900;line-height:0;vertical-align:-12px;margin-left:4px;}
.review-author{display:flex;align-items:center;gap:12px;}
.review-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--green) 0%,var(--green-light) 100%);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:18px;font-weight:700;flex-shrink:0;}
.review-name{font-size:14px;font-weight:700;color:var(--gray-dark);}
.review-meta{font-size:12px;color:var(--gray);}
.review-verified{display:inline-block;background:var(--green);color:var(--white);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}

/* ===== SPEC ===== */
.spec{background:var(--gray-light);}
.spec-table{margin-top:28px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.spec-table table{width:100%;border-collapse:collapse;background:var(--white);}
.spec-table th{background:var(--green-dark);color:var(--white);padding:14px 18px;font-size:14px;font-weight:700;text-align:left;width:40%;}
.spec-table td{padding:14px 18px;font-size:14px;color:var(--gray-dark);border-bottom:1px solid #eef2ef;}
.spec-table tr:last-child td{border-bottom:none;}
.spec-table tr:nth-child(even) td{background:#f8fbf9;}

/* ===== FAQ ===== */
.faq{background:var(--white);}
.faq-list{margin-top:32px;display:flex;flex-direction:column;gap:16px;}
.faq-item{border:2px solid #e8f0eb;border-radius:var(--radius);overflow:hidden;}
.faq-q{background:#f0f7f3;padding:18px 20px;font-size:15px;font-weight:700;color:var(--gray-dark);display:flex;align-items:flex-start;gap:12px;line-height:1.5;}
